<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b4513"/>
      <stop offset="100%" stop-color="#a0522d"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#a0522d"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="958" cy="-77" r="50" fill="#a0522d" opacity="0.20"/>
    <circle cx="166" cy="350" r="46" fill="#a0522d" opacity="0.08"/>
    <circle cx="171" cy="354" r="75" fill="#a0522d" opacity="0.16"/>
    <circle cx="52" cy="257" r="57" fill="#a0522d" opacity="0.12"/>
    <circle cx="624" cy="726" r="60" fill="#a0522d" opacity="0.06"/>
    <circle cx="86" cy="716" r="80" fill="#a0522d" opacity="0.15"/>
    <rect x="1197" y="-44" width="45" height="81" rx="8" fill="#8b4513" opacity="0.14" transform="rotate(5, 587, 330)"/>
    <rect x="159" y="618" width="99" height="53" rx="8" fill="#8b4513" opacity="0.06" transform="rotate(0, 815, 560)"/>
    <rect x="632" y="-73" width="75" height="40" rx="8" fill="#8b4513" opacity="0.07" transform="rotate(6, 1146, 90)"/>
    <rect x="1017" y="609" width="22" height="26" rx="8" fill="#8b4513" opacity="0.05" transform="rotate(6, 978, 549)"/>
    <rect x="19" y="381" width="69" height="34" rx="8" fill="#8b4513" opacity="0.13" transform="rotate(6, -90, 313)"/>
    <rect x="728" y="343" width="75" height="78" rx="8" fill="#8b4513" opacity="0.10" transform="rotate(40, 1, 272)"/>
    <rect x="1061" y="129" width="36" height="54" rx="8" fill="#8b4513" opacity="0.09" transform="rotate(37, 586, 400)"/>
    <rect x="1271" y="554" width="32" height="87" rx="8" fill="#8b4513" opacity="0.09" transform="rotate(36, -60, 600)"/>
    <polygon points="1284,259 1327,345 1241,345" fill="#a0522d" opacity="0.04"/>
    <polygon points="1002,495 1076,643 928,643" fill="#a0522d" opacity="0.03"/>
    <polygon points="444,-164 524,-4 364,-4" fill="#a0522d" opacity="0.09"/>
    <polygon points="817,-77 845,-21 789,-21" fill="#a0522d" opacity="0.11"/>

  <!-- Wave at bottom -->
  <path d="M0,550 C360,590 840,510 1200,550 L1200,630 L0,630Z" fill="#a0522d" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    화곡 셔츠룸
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 네트워크 보안
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#daa520" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#daa520" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 화곡 셔츠룸 — 네트워크 보안
  </text>
</svg>